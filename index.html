<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surprise</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      font-size: 4rem;
      animation: glow 1.5s infinite alternate;
    }

    @keyframes glow {
      from {

      to {
        text-shadow: 0 0 30px red, 0 0 50px crimson;
      }
    }

</head>
